<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>安衛巡檢表單</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 30px;
    color: #fff;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .header p {
    font-size: 14px;
    color: #8a8aa0;
  }

  .btn-list {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .btn-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 22px 20px;
    border-radius: 16px;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    text-decoration: none;
    letter-spacing: 2px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    -webkit-tap-highlight-color: transparent;
  }

  .btn-card:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .btn-card .badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(0,0,0,0.25);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .btn-card .icon {
    font-size: 28px;
  }

  .btn-b1f  { background: linear-gradient(135deg, #6c5ce7, #8b7bea); }
  .btn-1fs  { background: linear-gradient(135deg, #00b894, #55ddb8); }
  .btn-1fe  { background: linear-gradient(135deg, #e17055, #f0932b); }
  .btn-2f   { background: linear-gradient(135deg, #d63031, #e74c3c); }
  .btn-3f   { background: linear-gradient(135deg, #a55eea, #8854d0); }
  .btn-fbt  { background: linear-gradient(135deg, #0984e3, #74b9ff); }

  .footer {
    margin-top: auto;
    padding-top: 40px;
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>&#9889; 安衛巡檢表單</h1>
  <p>點擊按鈕前往對應樓層的 Google 表單</p>
</div>

<div class="btn-list">

  <a class="btn-card btn-b1f" href="https://docs.google.com/forms/d/e/1FAIpQLSe43nO_Nm0ZUk7_SNMjnHCwtDTMw156Wn5Q3CycLThtOizbNg/viewform" target="_blank" rel="noopener">
    <span class="badge">Google 表單</span>
    <span class="icon">&#128268;</span>
    <span>B1F 電氣棟</span>
  </a>

  <a class="btn-card btn-1fs" href="https://docs.google.com/forms/d/e/1FAIpQLSfYs-t-HroqrTH0R6NTR3JOmNcccji0RVLVN4l7xisuyWCLsQ/viewform" target="_blank" rel="noopener">
    <span class="badge">Google 表單</span>
    <span class="icon">&#127959;</span>
    <span>1F 設備棟</span>
  </a>

  <a class="btn-card btn-1fe" href="https://docs.google.com/forms/d/e/1FAIpQLSdHm44i0ZEevIlzmRYMor_aSpMtmRB16AswHK67FMn_ro_MlQ/viewform" target="_blank" rel="noopener">
    <span class="badge">Google 表單</span>
    <span class="icon">&#9889;</span>
    <span>1F 電氣棟</span>
  </a>

  <a class="btn-card btn-2f" href="https://docs.google.com/forms/d/e/1FAIpQLScnyUlje8dwMmJDe_U2d9qGtoRVJ73XnqHLQXwq1niwFfN71w/viewform" target="_blank" rel="noopener">
    <span class="badge">Google 表單</span>
    <span class="icon">&#128295;</span>
    <span>2F 電氣棟</span>
  </a>

  <a class="btn-card btn-3f" href="https://docs.google.com/forms/d/e/1FAIpQLScIDP5qSRWBh-UyMmPJjP4rm6wx-TRYEhjbCW7htISzXKnAaw/viewform" target="_blank" rel="noopener">
    <span class="badge">Google 表單</span>
    <span class="icon">&#127959;</span>
    <span>3F 電氣棟</span>
  </a>

  <a class="btn-card btn-fbt" href="https://docs.google.com/forms/d/e/1FAIpQLSenMebPLY_k77iMWgwoKE-MXITsVu9wCylPkByfscFW00sYkQ/viewform" target="_blank" rel="noopener">
    <span class="badge">Google 表單</span>
    <span class="icon">&#127968;</span>
    <span>FBT 西側</span>
  </a>

</div>

<div class="footer">營造安衛巡檢系統</div>

</body>
</html>
